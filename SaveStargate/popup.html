<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveStargate Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Save Stargate Plugin</h1>
      <p>Manage your tweet presets</p>
    </div>

    <div class="input-section">
      <input 
        type="text" 
        id="presetInput" 
        placeholder="Input text or #hashtag..."
        maxlength="280"
      >
      <button id="addBtn" class="btn btn-primary">Add preset</button>
    </div>

    <div class="presets-section">
      <h2>Your presets:</h2>
      <div id="presetsList" class="presets-list">
        <p class="empty-state">No presets yet. Add some!</p>
      </div>
    </div>

    <div class="footer">
      <small>💡 Tip: Presets are automatically saved to localStorage</small>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
